# Credential — a verifiable assertion about an identity
id: "fabric:primitive:credential"
name: "Credential"
version: "1.0.0"
layer: "foundation"
question: "What is verifiably asserted about an identity?"
extends: ["fabric:primitive:thing"]
description: >
  A verifiable credential or attestation about an Identity — a claim issued by
  one party about another, optionally cryptographically provable.
schemaOrg:
  type: "schema:CreativeWork"
  url: "https://schema.org/CreativeWork"
attributes:
  - name: id
    type: string
    required: true
  - name: type
    type: string
    required: true
    description: "Credential type, e.g. EmailVerified, EmployeeRole."
  - name: claim
    type: map
    required: false
  - name: proof
    type: string
    required: false
    description: "Signature / proof for tamper-evidence."
relationships:
  - name: assertedAbout
    schemaOrg: "schema:about"
    target: "fabric:primitive:identity"
    cardinality: "1"
  - name: issuedBy
    target: "fabric:primitive:identity"
    cardinality: "0..1"
  - name: evidencedBy
    target: "fabric:primitive:evidence"
    cardinality: "0..*"
invariants:
  - "A Credential names the Identity it is about."
examples:
  - id: "credential:email-verified:001"
    type: "EmailVerified"
