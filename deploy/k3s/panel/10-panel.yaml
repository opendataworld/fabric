# Static catalog UI served by a non-root nginx. The site files come from the
# `panel-site` ConfigMap, generated by Kustomize from site/* (see
# kustomization.yaml) — edit the catalog there and re-apply to roll out.
apiVersion: v1
kind: Service
metadata:
  name: stack-catalog
  namespace: stack-catalog
  labels:
    app.kubernetes.io/name: stack-catalog
    app.kubernetes.io/part-of: stack-catalog
spec:
  selector:
    app.kubernetes.io/name: stack-catalog
    app.kubernetes.io/part-of: stack-catalog
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stack-catalog
  namespace: stack-catalog
  labels:
    app.kubernetes.io/name: stack-catalog
    app.kubernetes.io/part-of: stack-catalog
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stack-catalog
      app.kubernetes.io/part-of: stack-catalog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stack-catalog
        app.kubernetes.io/part-of: stack-catalog
        app.kubernetes.io/component: ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101 # nginx user in the unprivileged image
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: site
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
      volumes:
        - name: site
          configMap:
            name: panel-site
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stack-catalog
  namespace: stack-catalog
  labels:
    app.kubernetes.io/name: stack-catalog
    app.kubernetes.io/part-of: stack-catalog
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - catalog.example.com
      secretName: stack-catalog-tls
  rules:
    - host: catalog.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stack-catalog
                port:
                  number: 80
