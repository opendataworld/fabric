apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply with:  kubectl apply -k deploy/k3s/registry
# Prereq: copy 02-htpasswd.example.yaml -> 02-htpasswd.yaml with a real bcrypt
# credential (git-ignored), or let install.sh generate it. Set your hostname in
# 20-ingress.yaml (or pass it to install.sh).
namespace: registry

resources:
  - 00-namespace.yaml
  - 01-config.yaml
  - 02-htpasswd.yaml
  - 10-zot.yaml
  - 20-ingress.yaml

images:
  - name: ghcr.io/project-zot/zot-linux-amd64
    newTag: v2.1.2

commonLabels:
  app.kubernetes.io/managed-by: kustomize
