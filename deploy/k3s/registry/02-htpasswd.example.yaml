# EXAMPLE credentials for the registry. Copy to 02-htpasswd.yaml (git-ignored),
# put a real bcrypt htpasswd line in it, then apply. Generate one with:
#
#   htpasswd -nbB pushuser 'YOUR_PASSWORD'
#
# (the -B forces bcrypt, which zot requires). Put the resulting "user:hash"
# line as the stringData value below. install.sh can generate this for you.
apiVersion: v1
kind: Secret
metadata:
  name: zot-htpasswd
  namespace: registry
  labels:
    app.kubernetes.io/name: zot
    app.kubernetes.io/part-of: registry
type: Opaque
stringData:
  htpasswd: "pushuser:$2y$05$CHANGE_ME_replace_with_a_real_bcrypt_hash"
