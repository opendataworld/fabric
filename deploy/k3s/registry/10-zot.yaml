# Zot — lightweight, OCI-native container registry with web UI, search, and
# cosign/notation signature verification (trust extension).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zot-data
  namespace: registry
  labels:
    app.kubernetes.io/name: zot
    app.kubernetes.io/part-of: registry
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: zot
  namespace: registry
  labels:
    app.kubernetes.io/name: zot
    app.kubernetes.io/part-of: registry
spec:
  selector:
    app.kubernetes.io/name: zot
    app.kubernetes.io/part-of: registry
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot
  namespace: registry
  labels:
    app.kubernetes.io/name: zot
    app.kubernetes.io/part-of: registry
    app.kubernetes.io/component: registry
spec:
  replicas: 1
  strategy:
    type: Recreate # RWO node-local volume
  selector:
    matchLabels:
      app.kubernetes.io/name: zot
      app.kubernetes.io/part-of: registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zot
        app.kubernetes.io/part-of: registry
        app.kubernetes.io/component: registry
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000 # zot user in the official image
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: zot
          image: ghcr.io/project-zot/zot-linux-amd64:v2.1.2
          imagePullPolicy: IfNotPresent
          args: ["serve", "/etc/zot/config.json"]
          ports:
            - name: http
              containerPort: 5000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/zot
              readOnly: true
            - name: htpasswd
              mountPath: /secret
              readOnly: true
            - name: data
              mountPath: /var/lib/registry
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: zot-config
        - name: htpasswd
          secret:
            secretName: zot-htpasswd
        - name: data
          persistentVolumeClaim:
            claimName: zot-data
        - name: tmp
          emptyDir: {}
