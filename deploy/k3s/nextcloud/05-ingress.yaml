# Traefik ingress (k3s's bundled controller) with automatic TLS via
# cert-manager, security-header + CalDAV/CardDAV well-known middlewares.
#
# Prereq for TLS: cert-manager installed and a ClusterIssuer named
# `letsencrypt-prod` (a ready-to-edit manifest is in 99-cert-manager.example.yaml).
# Replace nextcloud.example.com everywhere with your real hostname.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: nextcloud-headers
  namespace: nextcloud
spec:
  headers:
    stsSeconds: 15552000
    stsIncludeSubdomains: true
    stsPreload: true
    referrerPolicy: no-referrer
    customFrameOptionsValue: SAMEORIGIN
    contentTypeNosniff: true
    browserXssFilter: true
---
# Nextcloud service-discovery URLs must redirect to /remote.php/dav.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: nextcloud-wellknown
  namespace: nextcloud
spec:
  redirectRegex:
    regex: "^https://([^/]+)/\\.well-known/(card|cal)dav"
    replacement: "https://${1}/remote.php/dav/"
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextcloud
  namespace: nextcloud
  labels:
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/part-of: nextcloud
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: >-
      nextcloud-nextcloud-wellknown@kubernetescrd,nextcloud-nextcloud-headers@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - nextcloud.example.com
      secretName: nextcloud-tls
  rules:
    - host: nextcloud.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port:
                  number: 80
