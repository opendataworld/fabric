apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply with:  kubectl apply -k deploy/k3s/nextcloud
#
# Prerequisite: copy 01-secrets.example.yaml -> 01-secrets.yaml and fill in
# real values (the real file is git-ignored). 99-cert-manager.example.yaml is
# cluster-scoped and applied separately — see the README.
resources:
  - 00-namespace.yaml
  - 01-secrets.yaml
  - 02-postgres.yaml
  - 03-redis.yaml
  - 04-nextcloud.yaml
  - 05-ingress.yaml
  - 06-networkpolicy.yaml
  - 07-pdb.yaml
  - 08-config.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize

# Single place to pin / override every image tag (pin digests in prod).
images:
  - name: nextcloud
    newTag: 30-apache
  - name: postgres
    newTag: 16-alpine
  - name: redis
    newTag: 7-alpine
