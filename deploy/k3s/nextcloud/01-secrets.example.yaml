# ---------------------------------------------------------------------------
# EXAMPLE secrets — DO NOT apply as-is and DO NOT commit real values.
#
# Copy to 01-secrets.yaml, replace every CHANGE_ME, then apply that file
# (it is git-ignored). Generate strong values with, e.g.:
#
#     openssl rand -base64 24
#
# For production prefer Sealed Secrets, SOPS, or an external secret store
# (Vault / External Secrets Operator) over plaintext in git.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: nextcloud-db
  namespace: nextcloud
type: Opaque
stringData:
  POSTGRES_DB: nextcloud
  POSTGRES_USER: nextcloud
  POSTGRES_PASSWORD: CHANGE_ME_db_password
---
apiVersion: v1
kind: Secret
metadata:
  name: nextcloud-redis
  namespace: nextcloud
type: Opaque
stringData:
  REDIS_HOST_PASSWORD: CHANGE_ME_redis_password
---
apiVersion: v1
kind: Secret
metadata:
  name: nextcloud-admin
  namespace: nextcloud
type: Opaque
stringData:
  NEXTCLOUD_ADMIN_USER: admin
  NEXTCLOUD_ADMIN_PASSWORD: CHANGE_ME_admin_password
