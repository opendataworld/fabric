# OPTIONAL — expose the Kubernetes Dashboard at a public URL with TLS.
#
# A cluster-admin panel on the open internet is dangerous, so this is NOT part
# of the default install and adds a basic-auth gate in front of it. Apply it
# yourself only if you accept the risk:
#
#   1. Replace dashboard.example.com with your hostname (or pass a hostname to
#      ./install.sh, which does this for you).
#   2. Set real basic-auth credentials (see the Secret below).
#   3. kubectl apply -f 20-ingress.example.yaml
#
# Requires: cert-manager + a ClusterIssuer named `letsencrypt-prod`, and the
# k3s-bundled Traefik. The dashboard speaks HTTPS on its backend, so Traefik
# re-encrypts to it via the ServersTransport below.
---
# Traefik must talk HTTPS to the dashboard's self-signed backend.
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: dashboard-backend
  namespace: kubernetes-dashboard
spec:
  insecureSkipVerify: true
---
# Basic-auth gate. Generate credentials with:
#   htpasswd -nb admin 'YOUR_PASSWORD'
# then base64 the whole "user:hash" line into the `users` field below, e.g.:
#   echo -n 'admin:$apr1$...' | base64
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-basic-auth
  namespace: kubernetes-dashboard
type: Opaque
data:
  users: CHANGE_ME_base64_htpasswd_line
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: dashboard-auth
  namespace: kubernetes-dashboard
spec:
  basicAuth:
    secret: dashboard-basic-auth
---
# cert-manager issues the TLS cert for the IngressRoute (which cert-manager
# does not watch directly, so we request the Certificate explicitly).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dashboard-tls
  namespace: kubernetes-dashboard
spec:
  secretName: dashboard-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - dashboard.example.com
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kubernetes-dashboard
  namespace: kubernetes-dashboard
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`dashboard.example.com`)
      kind: Rule
      middlewares:
        - name: dashboard-auth
      services:
        - name: kubernetes-dashboard
          port: 443
          scheme: https
          serversTransport: dashboard-backend
  tls:
    secretName: dashboard-tls
