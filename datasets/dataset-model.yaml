# Dataset — a governed data asset
id: "fabric:primitive:dataset"
name: "Dataset"
version: "1.0.0"
layer: "domain"
question: "What collection of data is this?"
extends: ["fabric:primitive:thing"]
description: "A named, governed collection of data — the core asset of the fabric."
schemaOrg: { type: "schema:Dataset", url: "https://schema.org/Dataset" }
attributes:
  - { name: id, type: string, required: true }
  - { name: name, type: string, required: true }
  - { name: format, type: string, required: false }
relationships:
  - { name: conformsTo, target: "fabric:primitive:schema", cardinality: "0..1" }
  - { name: derivedFrom, target: "fabric:primitive:source", cardinality: "0..*", schemaOrg: "schema:isBasedOn" }
  - { name: governedBy, target: "fabric:primitive:policy", cardinality: "0..*" }
  - { name: hasState, target: "fabric:primitive:state", cardinality: "0..1" }
