<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fabric Agent</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .chat-wrap { max-width: 760px; margin: 0 auto; padding: 24px; display: flex;
      flex-direction: column; height: calc(100vh - 72px); }
    .chat-log { flex: 1; overflow-y: auto; padding: 8px 4px; display: flex;
      flex-direction: column; gap: 12px; }
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 14px; line-height: 1.5;
      white-space: pre-wrap; word-break: break-word; font-size: .95rem; }
    .msg.user { align-self: flex-end; background: linear-gradient(135deg, var(--brand), var(--brand-2)); color: #04121c; border-bottom-right-radius: 4px; }
    .msg.bot { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg.bot code, .msg.bot pre { background: var(--bg); padding: 1px 5px; border-radius: 5px; font-size: .85rem; }
    .msg.bot pre { padding: 10px; overflow-x: auto; }
    .chat-input { display: flex; gap: 10px; padding-top: 12px; border-top: 1px solid var(--border); }
    .chat-input input { flex: 1; padding: 12px 14px; border-radius: 10px; background: var(--bg);
      border: 1px solid var(--border); color: var(--text); font: inherit; }
    .chat-input input:focus { outline: none; border-color: var(--brand); }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .chip { font-size: .8rem; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; background: none; }
    .chip:hover { border-color: var(--brand); color: var(--text); }
  </style>
</head>
<body>
  <header class="nav">
    <a class="brand" href="index.html"><span class="brand-mark"></span>
      <span>Fabric<small>Agent</small></span></a>
    <nav class="nav-links"><a href="catalog/index.html">Catalog</a>
      <a href="build.html">Build</a>
      <a href="signup.html" class="btn btn-ghost">Sign up</a></nav>
  </header>

  <div class="chat-wrap">
    <div class="chips">
      <button class="chip" data-q="list classes">list classes</button>
      <button class="chip" data-q="resolve identity">resolve identity</button>
      <button class="chip" data-q="schema policy">schema policy</button>
      <button class="chip" data-q="graph">graph</button>
      <button class="chip" data-q="help">help</button>
    </div>
    <div class="chat-log" id="log"></div>
    <form class="chat-input" id="form">
      <input id="input" placeholder="Ask the fabric… (try: resolve agent 2)" autocomplete="off" autofocus />
      <button class="btn btn-primary" type="submit">Send</button>
    </form>
  </div>

  <script src="config.js"></script>
  <script>
    const API_BASE = window.FABRIC_API_BASE || "http://localhost:8088";
    // Point this at your packed tinyLLM agent (any endpoint taking {messages} ->
    // {reply} or OpenAI-style {choices}). Leave empty for command-only mode.
    const LLM_URL = window.FABRIC_LLM_URL || "";
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("input");

    function add(text, who) {
      const el = document.createElement("div");
      el.className = "msg " + who;
      el.innerHTML = who === "bot" ? text : escapeHtml(text);
      log.appendChild(el); log.scrollTop = log.scrollHeight;
      return el;
    }
    function escapeHtml(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
    async function api(path){
      try { const r = await fetch(API_BASE+path); if(!r.ok) throw new Error((await r.json()).error||r.statusText); return r.json(); }
      catch(e){ // zero-backend fallback for read-only model endpoints
        const m = await fetch("./data/model.json").then(r=>r.json()).catch(()=>null);
        if(m){ if(path==="/classes") return m.classes; if(path==="/graph") return {nodes:m.nodes,edges:m.edges}; }
        throw e;
      }
    }
    async function askLLM(text){
      if(!LLM_URL) return false;
      const el = add("…thinking", "bot");
      try{
        const r = await fetch(LLM_URL, { method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ messages:[
            {role:"system", content:"You are Fabric Agent, a concise assistant for the OpenDataWorld data fabric."},
            {role:"user", content:text}] }) });
        const d = await r.json();
        el.innerHTML = escapeHtml(d.reply || d.choices?.[0]?.message?.content || JSON.stringify(d));
      }catch(e){ el.innerHTML = "⚠️ tinyLLM agent unreachable ("+e.message+") at "+LLM_URL; }
      return true;
    }

    const HELP = `I'm Fabric Agent, powered by the Data Model API. Try:
• <code>list classes</code> — all primitives
• <code>schema &lt;name&gt;</code> — JSON Schema (e.g. <code>schema identity</code>)
• <code>resolve &lt;name&gt; [depth]</code> — traverse the graph (e.g. <code>resolve identity 2</code>)
• <code>graph</code> — node/edge counts
• <code>signups</code> — registered alpha testers`;

    async function handle(text) {
      const [cmd, ...rest] = text.trim().split(/\s+/);
      const arg = rest[0], depth = rest[1];
      try {
        if (/^(help|hi|hello)$/i.test(text.trim())) return add(HELP, "bot");
        if (/^(list|classes)$/i.test(cmd) || text.trim()==="list classes") {
          const cs = await api("/classes");
          return add("The fabric has <b>"+cs.length+"</b> classes:\n"+cs.map(c=>"• <b>"+c.name+"</b> — "+(c.question||"")).join("\n"), "bot");
        }
        if (cmd==="schema" && arg) { const s = await api("/schemas/"+arg);
          return add("<pre>"+escapeHtml(JSON.stringify(s,null,2)).slice(0,1200)+"</pre>","bot"); }
        if (cmd==="resolve" && arg) { const r = await api("/resolve/"+arg+(depth?"?depth="+depth:""));
          return add("Resolved <b>"+arg+"</b> (depth "+r.depth+") → "+r.resolved.length+" nodes:\n"+
            r.resolved.map(n=>"• "+n).join("\n")+"\n\nEdges:\n"+r.edges.map(e=>"• "+e.from+" —"+e.rel+"→ "+e.to).join("\n"),"bot"); }
        if (cmd==="graph") { const g = await api("/graph");
          return add("Graph: <b>"+g.nodes.length+"</b> nodes, <b>"+g.edges.length+"</b> edges.","bot"); }
        if (cmd==="signups") { const s = await api("/signups");
          return add("<b>"+s.registered+"</b> alpha tester(s) registered.","bot"); }
        if (await askLLM(text)) return;   // hand off freeform to the tinyLLM agent
        add("I didn't catch that. "+HELP, "bot");
      } catch(e){ add("⚠️ "+e.message+" — is the Fabric API running at "+API_BASE+"?", "bot"); }
    }

    form.addEventListener("submit", e=>{ e.preventDefault(); const t=input.value.trim(); if(!t)return;
      add(t,"user"); input.value=""; handle(t); });
    document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
      add(c.dataset.q,"user"); handle(c.dataset.q); }));
    add(HELP, "bot");
  </script>
</body>
</html>
