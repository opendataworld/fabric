<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join the Fabric alpha</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="nav">
    <a class="brand" href="index.html"><span class="brand-mark"></span>
      <span>Fabric<small>by OpenDataWorld</small></span></a>
    <nav class="nav-links"><a href="catalog/index.html">Catalog</a><a href="build.html">Build</a></nav>
  </header>

  <section class="section" style="max-width:560px;margin:0 auto;">
    <p class="eyebrow" style="text-align:center;">Alpha access</p>
    <h1 style="text-align:center;">Sign up to test Fabric</h1>
    <p class="lede" style="text-align:center;">
      Each signup creates a real <code>Identity</code> node in the Fabric data
      model and an audit <code>Event</code> — the platform, powered by its own model.
    </p>
    <form class="contact-form" id="signupForm" novalidate>
      <div class="field"><label for="name">Name</label>
        <input id="name" name="name" required autocomplete="name" /></div>
      <div class="field"><label for="email">Work email</label>
        <input id="email" name="email" type="email" required autocomplete="email" /></div>
      <div class="field"><label for="company">Company</label>
        <input id="company" name="company" autocomplete="organization" /></div>
      <div class="field"><label for="message">What do you want to test?</label>
        <textarea id="message" name="message" rows="3"></textarea></div>
      <button type="submit" class="btn btn-primary btn-block">Create my alpha account</button>
      <p class="form-status" id="status" role="status" aria-live="polite"></p>
    </form>
  </section>

  <footer class="footer"><p>© <span id="y"></span> OpenDataWorld · Fabric alpha</p></footer>
  <script src="config.js"></script>
  <script>
    // Point this at the deployed Data Model API (api/server.py). Falls back to local.
    const API_BASE = window.FABRIC_API_BASE || "http://localhost:8088";
    document.getElementById("y").textContent = new Date().getFullYear();
    const form = document.getElementById("signupForm");
    const statusEl = document.getElementById("status");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form).entries());
      if (!data.name || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(data.email || "")) {
        statusEl.textContent = "Please enter a valid name and email."; statusEl.className = "form-status err"; return;
      }
      statusEl.textContent = "Creating your account…"; statusEl.className = "form-status";
      try {
        const res = await fetch(`${API_BASE}/signup`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const body = await res.json();
        if (!res.ok) throw new Error(body.error || res.statusText);
        form.reset();
        statusEl.textContent = body.message + "  (id: " + body.identity.id + ")";
        statusEl.className = "form-status ok";
      } catch (err) {
        statusEl.textContent = "Could not reach the Fabric API (" + err.message + "). Is the API deployed?";
        statusEl.className = "form-status err";
      }
    });
  </script>
</body>
</html>
