# Feature — a capability unit of a product
id: "fabric:primitive:feature"
name: "Feature"
version: "1.0.0"
layer: "domain"
question: "What product capability is this?"
extends: ["fabric:primitive:thing"]
description: "A feature of a product, with its own lifecycle State."
schemaOrg: { type: "schema:Thing", url: "https://schema.org/Thing" }
attributes:
  - { name: id, type: string, required: true }
  - { name: name, type: string, required: true }
  - { name: status, type: string, required: false }
relationships:
  - { name: partOf, target: "fabric:primitive:product", cardinality: "0..*", schemaOrg: "schema:isPartOf" }
  - { name: realizes, target: "fabric:primitive:capability", cardinality: "0..*" }
  - { name: hasState, target: "fabric:primitive:state", cardinality: "0..1" }
